<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Dashboard</ion-title>
    <ion-buttons slot="end">
      <!-- Dark mode toggle placeholder — will be wired to ThemeService -->
      <ion-button aria-label="Modo oscuro">
        <ion-icon slot="icon-only" name="moon-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="dashboard-content">

  <!-- Collapsible large title (iOS-style) -->
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Dashboard</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Greeting section -->
  <div class="greeting-section">
    <p class="greeting-text">{{ greeting }},</p>
    <h2 class="greeting-name">{{ displayName }}</h2>
    <p class="greeting-date">{{ today | date: 'EEEE, d MMMM y' : '' : 'es' }}</p>
  </div>

  <!-- Summary stats cards -->
  <div class="stats-grid">
    <ion-card *ngFor="let stat of stats" class="stat-card">
      <ion-card-content>
        <ion-icon [name]="stat.icon" [color]="stat.color" class="stat-icon"></ion-icon>
        <p class="stat-value">{{ stat.value }}</p>
        <p class="stat-label">{{ stat.label }}</p>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Quick actions -->
  <ion-list-header>
    <ion-label>Acciones rápidas</ion-label>
  </ion-list-header>

  <ion-list lines="none" class="quick-actions">
    <ion-item button detail routerLink="/tabs/habits">
      <ion-icon name="add-circle-outline" slot="start" color="success"></ion-icon>
      <ion-label>Registrar hábito de hoy</ion-label>
    </ion-item>
    <ion-item button detail routerLink="/tabs/expenses">
      <ion-icon name="receipt-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Agregar gasto</ion-label>
    </ion-item>
  </ion-list>

  <!-- Placeholder for future chart -->
  <ion-card class="chart-placeholder">
    <ion-card-header>
      <ion-card-subtitle>Este mes</ion-card-subtitle>
      <ion-card-title>Gastos por categoría</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div class="chart-empty">
        <ion-icon name="bar-chart-outline" color="medium"></ion-icon>
        <p>El gráfico aparecerá aquí cuando agregues gastos.</p>
      </div>
    </ion-card-content>
  </ion-card>

</ion-content>
