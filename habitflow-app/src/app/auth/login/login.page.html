<ion-content [fullscreen]="true" class="login-content">

  <div class="login-container">

    <!-- App logo / branding -->
    <div class="login-header">
      <ion-icon name="flash-outline" class="app-icon"></ion-icon>
      <h1 class="app-title">HabitFlow</h1>
      <p class="app-subtitle">Construye hábitos. Controla tus gastos.</p>
    </div>

    <!-- Login form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>

      <!-- Email field -->
      <ion-item
        [class.ion-invalid]="email?.invalid && email?.touched"
        [class.ion-valid]="email?.valid"
        lines="none"
        class="form-item">
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          formControlName="email"
          type="email"
          label="Correo electrónico"
          labelPlacement="floating"
          placeholder="tu@email.com"
          autocomplete="email"
          inputmode="email">
        </ion-input>
      </ion-item>
      <ion-note class="error-note" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es obligatorio.</span>
        <span *ngIf="email?.errors?.['email']">Ingresa un correo válido.</span>
      </ion-note>

      <!-- Password field -->
      <ion-item
        [class.ion-invalid]="password?.invalid && password?.touched"
        [class.ion-valid]="password?.valid"
        lines="none"
        class="form-item">
        <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          formControlName="password"
          [type]="showPassword ? 'text' : 'password'"
          label="Contraseña"
          labelPlacement="floating"
          placeholder="Mínimo 6 caracteres"
          autocomplete="current-password">
        </ion-input>
        <ion-button
          slot="end"
          fill="clear"
          size="small"
          (click)="togglePasswordVisibility()"
          aria-label="Mostrar u ocultar contraseña">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
      <ion-note class="error-note" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">La contraseña es obligatoria.</span>
        <span *ngIf="password?.errors?.['minlength']">La contraseña debe tener al menos 6 caracteres.</span>
      </ion-note>

      <!-- Login button -->
      <ion-button
        expand="block"
        type="submit"
        class="login-button"
        [disabled]="loginForm.invalid">
        Iniciar sesión
      </ion-button>

    </form>

    <!-- Register link -->
    <div class="register-link">
      <p>
        ¿No tienes cuenta?
        <ion-text color="primary">
          <span (click)="navigateToRegister()" class="link-text">Regístrate aquí</span>
        </ion-text>
      </p>
    </div>

  </div>

</ion-content>
